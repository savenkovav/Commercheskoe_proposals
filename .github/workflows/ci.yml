name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run demo (no AI)
        run: python scripts/run_demo.py --no-ai

      - name: Check output generated
        run: test -n "$(ls output/KP_*.xlsx 2>/dev/null | head -1)"
