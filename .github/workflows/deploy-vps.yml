name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "."
          target: "/opt/comm-proposals"
          rm: true
          strip_components: 0
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            export APP_DIR=/opt/comm-proposals
            if [ -n "${{ secrets.VPS_DOTENV }}" ]; then
              printf '%s\n' "${{ secrets.VPS_DOTENV }}" > "$APP_DIR/.env"
            fi
            bash "$APP_DIR/scripts/vps_remote_setup.sh"
