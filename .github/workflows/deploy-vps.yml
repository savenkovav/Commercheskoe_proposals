name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release archive
        run: |
          tar czf /tmp/release.tgz \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='output' \
            --exclude='__pycache__' \
            --exclude='.DS_Store' \
            --exclude='.cursor' \
            -C "${{ github.workspace }}" .

      - name: Upload release to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "/tmp/release.tgz"
          target: "/tmp/comm-proposals-release.tgz"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR=/opt/comm-proposals
            mkdir -p "$APP_DIR"
            tar xzf /tmp/comm-proposals-release.tgz -C "$APP_DIR"
            rm -f /tmp/comm-proposals-release.tgz
            if [ -n "${{ secrets.VPS_DOTENV }}" ]; then
              printf '%s\n' "${{ secrets.VPS_DOTENV }}" > "$APP_DIR/.env"
            fi
            bash "$APP_DIR/scripts/vps_remote_setup.sh"

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            curl -fsS -o /dev/null http://127.0.0.1/ || curl -fsS -o /dev/null http://127.0.0.1:8080/
            docker compose -f /opt/comm-proposals/docker-compose.prod.yml ps
