# Продакшен: только веб-интерфейс + nginx для домена (Beget VPS и аналоги)
# Запуск: docker compose -f docker-compose.prod.yml up -d --build

services:
  kp-web:
    build: .
    container_name: comm-proposals-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8080"
      WEB_BEHIND_PROXY: "true"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    expose:
      - "8080"
    command: ["python", "-m", "src.web.server"]

  nginx:
    image: nginx:1.27-alpine
    container_name: comm-proposals-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/beget/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kp-web
