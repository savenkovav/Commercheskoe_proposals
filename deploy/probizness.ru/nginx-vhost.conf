# Виртуальный хост probizness.ru для nginx на VPS (порты 80/443 заняты основным nginx).
# Подключите фрагмент в /root/nginx.conf или смонтируйте как include.

server {
    listen 80;
    server_name probizness.ru www.probizness.ru;

    client_max_body_size 64m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name probizness.ru www.probizness.ru;

    ssl_certificate /etc/letsencrypt/live/probizness.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/probizness.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 64m;

    location / {
        proxy_pass http://comm-proposals-web:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
