# Виртуальный хост regionsnab7.ru для target-nginx на VPS (195.133.73.215).
# Фрагмент для /root/nginx.conf — прокси на comm-proposals-web:8080

    # regionsnab7.ru — КП-Ассистент
    server {
        listen 80;
        server_name regionsnab7.ru www.regionsnab7.ru;

        client_max_body_size 64m;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://comm-proposals-web:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
