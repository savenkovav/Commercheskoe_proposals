# Виртуальный хост regionsnab7.ru для ISPmanager nginx на VPS.
# ВАЖНО: только proxy_pass, без вложенных location для .css/.js —
# иначе ISPmanager отдаёт статику из /var/www/... и ломает стили на HTTPS.

server {
	listen 77.222.55.100:80;
	server_name regionsnab7.ru www.regionsnab7.ru;

	client_max_body_size 64m;
	access_log /var/www/httpd-logs/regionsnab7.ru.access.log;
	error_log /var/www/httpd-logs/regionsnab7.ru.error.log notice;

	location / {
		proxy_pass http://127.0.0.1:18080;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 600s;
		proxy_send_timeout 600s;
	}
}

server {
	listen 77.222.55.100:443 ssl;
	server_name regionsnab7.ru www.regionsnab7.ru;

	ssl_certificate "/var/www/httpd-cert/www-root/regionsnab7.ru_le2.crtca";
	ssl_certificate_key "/var/www/httpd-cert/www-root/regionsnab7.ru_le2.key";
	ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
	ssl_prefer_server_ciphers on;
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_dhparam /etc/ssl/certs/dhparam4096.pem;

	client_max_body_size 64m;
	access_log /var/www/httpd-logs/regionsnab7.ru.access.log;
	error_log /var/www/httpd-logs/regionsnab7.ru.error.log notice;

	location / {
		proxy_pass http://127.0.0.1:18080;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 600s;
		proxy_send_timeout 600s;
	}
}
