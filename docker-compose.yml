services:
  kp-web:
    build: .
    container_name: comm-proposals-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      PYTHONPATH: /app
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8080"
    command: ["python", "-m", "src.web.server"]
