services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: comm-proposals-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-masterKey}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - default

  kp-web:
    build: .
    container_name: comm-proposals-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8090:8080"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      PYTHONPATH: /app
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8080"
      WEB_BEHIND_PROXY: "true"
      MEILISEARCH_HOST: http://meilisearch:7700
    depends_on:
      - meilisearch
    networks:
      - default
      - target_network
    command: ["python", "-m", "src.web.server"]

volumes:
  meilisearch_data:

networks:
  target_network:
    external: true
    name: root_target_network
