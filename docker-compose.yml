services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: comm-proposals-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_LOG_LEVEL: INFO
    volumes:
      - meili_data:/meili_data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - app-network

  kp-web:
    build: .
    container_name: comm-proposals-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8090:8080"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      PYTHONPATH: /app
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8080"
      WEB_BEHIND_PROXY: "true"
      MEILISEARCH_HOST: http://meilisearch:7700
    depends_on:
      - meilisearch
    networks:
      - app-network
      - target_network
    command: ["python", "-m", "src.web.server"]

volumes:
  meili_data:

networks:
  app-network:
    driver: bridge
  target_network:
    external: true
    name: root_target_network
